name: 基金涨跌推送

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests -q
      - run: python fund_monitor.py
        env:
          PUSHPLUS_TOKEN: e8ab57d64b72420aa7ad6254973ef236
